<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{

body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--t1);line-height:1.7}
.container{max-width:1360px;margin:0 auto;padding:0 28px}

/* HERO */
.hero{background:linear-gradient(135deg,#0d1020 0%,#0a0c14 40%,#151020 100%);padding:44px 0 36px;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-120px;right:-80px;width:500px;height:500px;background:radial-gradient(circle,rgba(168,85,247,.07) 0%,transparent 65%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-120px;left:-80px;width:400px;height:400px;background:radial-gradient(circle,rgba(79,140,255,.05) 0%,transparent 65%);pointer-events:none}
.hero h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#e8eaf0,#b8a8e8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.02em}
.hero .sub{color:var(--t2);font-size:.92rem;margin-top:6px}
.hero .date{color:var(--t3);font-size:.78rem;margin-top:10px}
.nav-links{display:flex;gap:12px;margin-top:16px}
.nav-link{padding:6px 16px;border-radius:20px;font-size:.78rem;font-weight:600;text-decoration:none;transition:all .2s}
.nav-link.back{background:rgba(79,140,255,.1);color:var(--jh);border:1px solid rgba(79,140,255,.2)}

/* SECTIONS */
.section{margin:32px 0}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.section-header .icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.section-header h2{font-size:1.2rem;font-weight:700}
.section-header .tag{font-size:.7rem;padding:3px 10px;border-radius:20px;font-weight:500}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px;box-shadow:0 4px 24px rgba(0,0,0,.25);transition:border-color .2s}
.card:hover{border-color:rgba(168,85,247,.2)}
.card-title{font-size:.88rem;font-weight:600;color:var(--t2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.chart-box{position:relative;height:340px;width:100%}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin:28px 0}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 22px;position:relative;overflow:hidden;transition:all .2s}
.kpi:hover{transform:translateY(-2px);border-color:var(--purple)}
.kpi .label{font-size:.72rem;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.kpi .val{font-size:1.4rem;font-weight:700;margin:4px 0 2px}
.kpi .sub{font-size:.72rem;color:var(--t3)}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi:nth-child(1)::after{background:linear-gradient(90deg,#a855f7,#8b5cf6)}
.kpi:nth-child(2)::after{background:linear-gradient(90deg,var(--el),#d97706)}
.kpi:nth-child(3)::after{background:linear-gradient(90deg,var(--jh),#3b82f6)}
.kpi:nth-child(4)::after{background:linear-gradient(90deg,var(--hs),#16a34a)}
.kpi:nth-child(5)::after{background:linear-gradient(90deg,var(--cyan),#0891b2)}
.kpi:nth-child(6)::after{background:linear-gradient(90deg,var(--pink),#db2777)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:.8rem}
.tbl th{background:rgba(168,85,247,.06);padding:10px 12px;text-align:right;font-weight:600;color:var(--t2);border-bottom:1px solid var(--border);white-space:nowrap}
.tbl th:first-child{text-align:left;border-radius:8px 0 0 0}
.tbl th:last-child{border-radius:0 8px 0 0}
.tbl td{padding:9px 12px;text-align:right;border-bottom:1px solid rgba(42,48,85,.5);white-space:nowrap}
.tbl td:first-child{text-align:left;font-weight:500;color:var(--t1)}
.tbl tr:hover td{background:rgba(168,85,247,.03)}
.tbl .highlight-row td{background:rgba(168,85,247,.06);font-weight:600}

.grade-badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:.7rem;font-weight:600;margin-right:4px}
.grade-el{background:var(--el-bg);color:var(--el)}
.grade-jh{background:var(--jh-bg);color:var(--jh)}
.grade-hs{background:var(--hs-bg);color:var(--hs)}
.up{color:var(--hs)!important}.down{color:var(--red)!important}

/* INSIGHTS */
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.insight{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;border-left:4px solid;transition:all .2s}
.insight:hover{transform:translateY(-2px)}
.insight.warn{border-left-color:var(--orange)}
.insight.danger{border-left-color:var(--red)}
.insight.good{border-left-color:var(--hs)}
.insight.info{border-left-color:var(--jh)}
.insight.strategy{border-left-color:var(--purple)}
.insight.neutral{border-left-color:var(--cyan)}
.insight h4{font-size:.88rem;font-weight:700;margin-bottom:8px}
.insight p{font-size:.8rem;color:var(--t2);line-height:1.7}
.insight .hl{font-weight:700;color:var(--t1)}
.insight .num{font-weight:800;font-size:.92rem}
.insight ul{margin:8px 0 0 18px;font-size:.78rem;color:var(--t2)}
.insight li{margin:4px 0;line-height:1.5}

.tab-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab-pill{padding:6px 14px;border-radius:20px;font-size:.76rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--t2);transition:all .2s;font-family:inherit}

.tab-pill:hover:not(.active){border-color:var(--purple);color:var(--purple)}

footer{border-top:1px solid var(--border);padding:24px 0;margin-top:56px;text-align:center;color:var(--t3);font-size:.72rem}

@media(max-width:900px){
  .grid2,.grid3,.insight-grid{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .hero h1{font-size:1.5rem}
  .tbl{font-size:.72rem}
  .tbl th,.tbl td{padding:7px 8px}

@media print{
  body{background:#fff;color:#222}
  .card,.kpi,.insight{background:#fff;border:1px solid #ddd;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .hero{background:#f0f4f8}.hero h1{-webkit-text-fill-color:#222}
}
</style>
</head>

const allGrades = ['小1','小2','小3','小4','小5','小6','中1','中2','中3','高1','高2','高3'];

Chart.defaults.font.family="'Noto Sans JP',sans-serif";

const sortedYMs = Object.keys(gradeData).sort();
const labels = sortedYMs.map(ym => {

  return `${d.year}/${String(d.month).padStart(2,'0')}`;
});

function getGradeVal(ym, grade) {
  return gradeData[ym]?.grades?.[grade] || 0;
}
function getLevelCount(ym, level) {
  const g = gradeData[ym]?.grades || {};
  if (level === 'el') return (g['小1']||0)+(g['小2']||0)+(g['小3']||0)+(g['小4']||0)+(g['小5']||0)+(g['小6']||0);

  return 0;
}

const latest = gradeData[sortedYMs[sortedYMs.length-1]];
const latestEl = getLevelCount(sortedYMs[sortedYMs.length-1],'el');

const hsPct = (latestHs/latest.total*100).toFixed(0);

  <div class="kpi"><div class="label">学年数</div><div class="val" style="color:var(--pink)">${Object.keys(latest.grades).length}学年</div><div class="sub">在籍学年の広がり</div></div>
`;

// ========== Stacked Area Chart ==========
let areaChart;
const areaViews = ['all','el','jh','hs'];
const areaViewLabels = {all:'全学年',el:'小学生',jh:'中学生',hs:'高校生'};
let currentAreaView = 'all';

function getAreaGrades(view) {
  if (view === 'el') return allGrades.filter(g => g.startsWith('小'));
  if (view === 'jh') return allGrades.filter(g => g.startsWith('中'));
  if (view === 'hs') return allGrades.filter(g => g.startsWith('高'));
  return allGrades;
}

function buildAreaTabs() {
  const row = document.getElementById('areaTabRow');
  row.innerHTML = areaViews.map(v =>
    `<button class="tab-pill ${v===currentAreaView?'active':''}" onclick="switchAreaView('${v}')">${areaViewLabels[v]}</button>`
  ).join('');
}

function renderAreaChart() {
  const grades = getAreaGrades(currentAreaView);
  const datasets = grades.filter(g => {
    return sortedYMs.some(ym => getGradeVal(ym, g) > 0);
  }).map(g => ({
    label: g,
    data: sortedYMs.map(ym => getGradeVal(ym, g)),
    backgroundColor: gradeColors[g] + '88',
    borderColor: gradeColors[g],
    borderWidth: 1.5,
    fill: true,
    tension: 0.3,
    pointRadius: 0,
  }));

  if (areaChart) areaChart.destroy();
  areaChart = new Chart(document.getElementById('areaChart'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 12, padding: 12, color: '#8b92b0' } },
        tooltip: { mode: 'index', intersect: false, callbacks: {
          footer: items => '合計: ' + items.reduce((s,i) => s + i.parsed.y, 0) + '名'
        }}
      },
      scales: {
        y: { stacked: true, grid: { color: 'rgba(42,48,85,.4)' }, ticks: { callback: v => v + '名' } },
        x: { grid: { display: false }, ticks: { maxRotation: 45, font: { size: 8 } } }
      }
    }
  });
}
window.switchAreaView = function(v) { currentAreaView = v; buildAreaTabs(); renderAreaChart(); };
buildAreaTabs();
renderAreaChart();

const jhData = sortedYMs.map(ym => getLevelCount(ym, 'jh'));
const hsData = sortedYMs.map(ym => getLevelCount(ym, 'hs'));

new Chart(document.getElementById('levelChart'), {

      { label: '高校生', data: hsData, backgroundColor: levelColors.hs + '99', borderRadius: 3, barPercentage: .7 },
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { position: 'bottom', labels: { boxWidth: 12, color: '#8b92b0' } },

    },
    scales: {

    }
  }
});

new Chart(document.getElementById('levelPctChart'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      { label: '小学生%', data: sortedYMs.map((ym,i) => totalData[i] > 0 ? +(elData[i]/totalData[i]*100).toFixed(1) : 0), borderColor: levelColors.el, backgroundColor: levelColors.el + '15', fill: true, tension: .3, pointRadius: 2, borderWidth: 2.5 },
      { label: '中学生%', data: sortedYMs.map((ym,i) => totalData[i] > 0 ? +(jhData[i]/totalData[i]*100).toFixed(1) : 0), borderColor: levelColors.jh, backgroundColor: levelColors.jh + '15', fill: true, tension: .3, pointRadius: 2, borderWidth: 2.5 },
      { label: '高校生%', data: sortedYMs.map((ym,i) => totalData[i] > 0 ? +(hsData[i]/totalData[i]*100).toFixed(1) : 0), borderColor: levelColors.hs, backgroundColor: levelColors.hs + '15', fill: true, tension: .3, pointRadius: 2, borderWidth: 2.5 },
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: {

});

const aprilLabels = aprilYMs.map(ym => gradeData[ym].year + '年4月');

new Chart(document.getElementById('aprilChart'), {

// April table
(function(){
  let headHtml = '<th>学年</th>';
  aprilYMs.forEach(ym => {
    headHtml += `<th>${gradeData[ym].year}年4月</th>`;
  });
  if (aprilYMs.length >= 2) headHtml += '<th>増減</th>';
  document.getElementById('aprilHead').innerHTML = headHtml;

  let bodyHtml = '';
  const displayGrades = [...aprilGrades, '小学生計', '中学生計', '高校生計', '合計'];
  
  displayGrades.forEach(g => {
    const isTotal = g.includes('計') || g === '合計';
    bodyHtml += `<tr class="${isTotal ? 'highlight-row' : ''}">`;
    
    const badge = g.startsWith('小') ? 'grade-el' : g.startsWith('中') ? 'grade-jh' : g.startsWith('高') ? 'grade-hs' : '';
    bodyHtml += `<td><span class="grade-badge ${badge}">${g}</span></td>`;
    
    const vals = aprilYMs.map(ym => {
      if (g === '小学生計') return getLevelCount(ym, 'el');
      if (g === '中学生計') return getLevelCount(ym, 'jh');
      if (g === '高校生計') return getLevelCount(ym, 'hs');
      if (g === '合計') return gradeData[ym].total;
      return getGradeVal(ym, g);
    });
    
    vals.forEach(v => { bodyHtml += `<td>${v > 0 ? v + '名' : '—'}</td>`; });
    
    if (aprilYMs.length >= 2) {
      const last = vals[vals.length-1];
      const prev = vals[vals.length-2];
      const diff = last - prev;
      bodyHtml += `<td class="${diff > 0 ? 'up' : diff < 0 ? 'down' : ''}">${diff > 0 ? '+' : ''}${diff}名</td>`;
    }
    bodyHtml += '</tr>';
  });
  document.getElementById('aprilBody').innerHTML = bodyHtml;
})();

// ========== Detail Table ==========
const fyList = [...new Set(sortedYMs.map(ym => gradeData[ym].fy))].sort();
let currentFy = fyList[fyList.length - 1];

function buildDetailTabs() {
  document.getElementById('detailTabRow').innerHTML = fyList.map(fy =>
    `<button class="tab-pill ${fy===currentFy?'active':''}" onclick="switchDetailFy(${fy})">${fy}年度</button>`
  ).join('');
}

function renderDetailTable() {
  const fyYMs = sortedYMs.filter(ym => gradeData[ym].fy === currentFy);
  const gradesInFy = allGrades.filter(g => fyYMs.some(ym => getGradeVal(ym, g) > 0));
  
  let headHtml = '<th>月</th>';
  gradesInFy.forEach(g => {
    const badge = g.startsWith('小') ? 'grade-el' : g.startsWith('中') ? 'grade-jh' : 'grade-hs';
    headHtml += `<th><span class="grade-badge ${badge}">${g}</span></th>`;
  });
  headHtml += '<th>合計</th><th>小計</th><th>中計</th><th>高計</th>';
  document.getElementById('detailHead').innerHTML = headHtml;
  
  let bodyHtml = '';
  fyYMs.forEach(ym => {
    const d = gradeData[ym];
    bodyHtml += '<tr>';
    bodyHtml += `<td>${d.year}/${String(d.month).padStart(2,'0')}</td>`;
    gradesInFy.forEach(g => {
      const v = getGradeVal(ym, g);
      bodyHtml += `<td>${v > 0 ? v : '—'}</td>`;
    });
    bodyHtml += `<td style="font-weight:700">${d.total}</td>`;
    bodyHtml += `<td style="color:var(--el)">${getLevelCount(ym,'el')}</td>`;
    bodyHtml += `<td style="color:var(--jh)">${getLevelCount(ym,'jh')}</td>`;
    bodyHtml += `<td style="color:var(--hs)">${getLevelCount(ym,'hs')}</td>`;
    bodyHtml += '</tr>';
  });
  document.getElementById('detailBody').innerHTML = bodyHtml;
}

window.switchDetailFy = function(fy) { currentFy = fy; buildDetailTabs(); renderDetailTable(); };
buildDetailTabs();
renderDetailTable();
